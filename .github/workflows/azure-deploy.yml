name: Deploy to Azure

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node dependencies
        run: npm install --production

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python packages into deploy bundle
        run: |
          pip install --target .python_packages pypdf pymupdf reportlab
          echo "📋 Python packages installed:"
          ls .python_packages/ | head -20
          PYTHONPATH=.python_packages python3 -c "import pypdf; import fitz; import reportlab; print('✅ pypdf=' + pypdf.__version__)"

      - name: Make startup script executable
        run: chmod +x startup.sh

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: rafer-abmeldebot
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
