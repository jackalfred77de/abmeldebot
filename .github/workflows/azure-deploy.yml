name: Deploy to Azure

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node dependencies
        run: npm install --production

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies into local folder
        run: |
          pip install -r requirements.txt --target ./python_packages
          echo "✅ Python packages installed to ./python_packages"
          ls ./python_packages/ | head -20

      - name: Make startup script executable
        run: chmod +x startup.sh

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: rafer-abmeldebot
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
